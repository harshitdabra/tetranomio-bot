services:
  - type: web
    name: cipher-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: COINGLASS_API_KEY
        sync: false
      - key: ALLOWED_USER_ID
        sync: false
      - key: OWNER_TELEGRAM
        sync: false
