services:
  - type: web
    name: tetranomio-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: COINGLASS_API_KEY
        sync: false
      - key: ALLOWED_USER_ID
        sync: false
      - key: OWNER_TELEGRAM
        sync: false
      - key: GEMINI_API_KEY
        sync: false
